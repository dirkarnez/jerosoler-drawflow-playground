<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://unpkg.com/drawflow@0.0.60/dist/drawflow.min.css" />
<script src="https://unpkg.com/drawflow@0.0.60/dist/drawflow.min.js"></script>
<style>
        #drawflow {
          display: block;
          position: relative;
          width: 100%;
          height: 800px;
        }
</style>
</head>
<body>
<div id="drawflow"></div>

<script>
var id = document.getElementById("drawflow");
const editor = new Drawflow(id);
    editor.reroute = true;
    editor.reroute_fix_curvature = true;
editor.start();

    const data = {
      name: ''
    };

    editor.addNode('foo', 1, 1, 100, 200, 'foo', data, 'Foo');
    editor.addNode('bar', 1, 1, 400, 100, 'bar', data, 'Bar A');
    editor.addNode('bar', 1, 1, 400, 300, 'bar', data, 'Bar B');

    editor.addConnection(1, 2, "output_1", "input_1");
    editor.addConnection(1, 3, "output_1", "input_1");
</script>

</body>
</html>
